name: "Nokta MD Ratchet"

on:
  pull_request_target:
    paths:
      - "program.md"
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout main branch scores
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Score main branch (baseline)
        id: main_score
        run: |
          cd main-branch
          MAIN_SCORES=$(python scripts/section_score.py --all --md-file program.md 2>/dev/null | grep "TOTAL AVERAGE" | grep -oP '\d+' | head -1 || echo "0")
          echo "total=$MAIN_SCORES" >> $GITHUB_OUTPUT
          SECTION_MAP="{"
          for i in $(seq 0 12); do
            SEC_SCORE=$(python scripts/section_score.py --section $i --md-file program.md 2>/dev/null | grep "Score:" | grep -oP '\d+' | head -1 || echo "0")
            if [ "$i" -gt 0 ]; then
              SECTION_MAP+=" ,"
            fi
            SECTION_MAP+="\"section_${i}\":${SEC_SCORE}"
          done
          SECTION_MAP+="}"
          SECTIONS_FILE="$GITHUB_WORKSPACE/main_sections.json"
          echo "$SECTION_MAP" > "$SECTIONS_FILE"
          echo "sections_path=$SECTIONS_FILE" >> $GITHUB_OUTPUT

      - name: Score PR branch
        id: pr_score
        run: |
          PR_SCORES=$(python scripts/section_score.py --all --md-file program.md 2>/dev/null | grep "TOTAL AVERAGE" | grep -oP '\d+' | head -1 || echo "0")
          echo "total=$PR_SCORES" >> $GITHUB_OUTPUT
          python scripts/section_score.py --all --ci-comment --md-file program.md > /tmp/score_report.md
          SECTION_MAP="{"
          for i in $(seq 0 12); do
            SEC_SCORE=$(python scripts/section_score.py --section $i --md-file program.md 2>/dev/null | grep "Score:" | grep -oP '\d+' | head -1 || echo "0")
            if [ "$i" -gt 0 ]; then
              SECTION_MAP+=" ,"
            fi
            SECTION_MAP+="\"section_${i}\":${SEC_SCORE}"
          done
          SECTION_MAP+="}"
          SECTIONS_FILE="$GITHUB_WORKSPACE/pr_sections.json"
          echo "$SECTION_MAP" > "$SECTIONS_FILE"
          echo "sections_path=$SECTIONS_FILE" >> $GITHUB_OUTPUT

      - name: Check for regressions
        id: regression
        env:
          MAIN_SECTIONS_FILE: ${{ steps.main_score.outputs.sections_path }}
          PR_SECTIONS_FILE: ${{ steps.pr_score.outputs.sections_path }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          with open(os.environ["MAIN_SECTIONS_FILE"], "r", encoding="utf-8") as f:
              main_sections = json.load(f)
          with open(os.environ["PR_SECTIONS_FILE"], "r", encoding="utf-8") as f:
              pr_sections = json.load(f)

          regression = False
          for section in sorted(main_sections.keys()):
              main_val = int(main_sections.get(section, 0) or 0)
              pr_val = int(pr_sections.get(section, 0) or 0)
              if pr_val < main_val:
                  print(f"⚠️  {section} regressed: {main_val} → {pr_val}")
                  regression = True

          Path("regression.flag").write_text("true" if regression else "false")
          PY
          REGRESSION=$(cat regression.flag)
          echo "detected=$REGRESSION" >> $GITHUB_OUTPUT

      - name: Post score comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/score_report.md

      - name: Gate decision
        run: |
          if [ "${{ steps.regression.outputs.detected }}" = "true" ]; then
            echo "❌ REJECTED: Score regression detected."
            echo "PR score: ${{ steps.pr_score.outputs.total }}"
            echo "Main score: ${{ steps.main_score.outputs.total }}"
            exit 1
          else
            echo "✅ PASSED: No regressions. Eligible for merge."
            echo "PR score: ${{ steps.pr_score.outputs.total }}"
            echo "Main score: ${{ steps.main_score.outputs.total }}"
          fi

  # auto-merge disabled — PRs remain open for instructor review.
  # To re-enable: uncomment the block below.
  #
  # auto-merge:
  #   needs: score
  #   runs-on: ubuntu-latest
  #   if: success() && !github.event.pull_request.draft
