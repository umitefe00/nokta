name: "Nokta MD Ratchet"

on:
  pull_request:
    paths:
      - "program.md"
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout main branch scores
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Check Immutable Files
        id: immutable_check
        run: |
          git fetch origin main
          IMMUTABLE_PATTERNS=(
            ".github/workflows/"
            "scripts/"
            "checklists/"
            "app.json"
            "tsconfig.json"
            "babel.config.js"
            ".eslintrc.js"
            "package.json"
          )
          MODIFIED=false
          for pattern in "${IMMUTABLE_PATTERNS[@]}"; do
            if git diff origin/main --name-only | grep -E "$pattern" > /dev/null; then
              MODIFIED=true
              echo "⚠️  Immutable file modified: $pattern"
            fi
          done
          if [ "$MODIFIED" == "true" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "### ⚠️ IMMUTABLE FILE VIOLATION" >> /tmp/score_report.md
            echo "You have modified files protected by CI. Spec-only PRs must NOT touch infrastructure." >> /tmp/score_report.md
            echo "" >> /tmp/score_report.md
          else
            echo "detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Score main branch (baseline)
        id: main_score
        run: |
          cd main-branch
          python scripts/section_score.py --all --json --md-file program.md > $GITHUB_WORKSPACE/main_scores.json
          echo "sections_path=$GITHUB_WORKSPACE/main_scores.json" >> $GITHUB_OUTPUT

      - name: Score PR branch
        id: pr_score
        run: |
          python scripts/section_score.py --all --json --md-file program.md > $GITHUB_WORKSPACE/pr_scores.json
          python scripts/section_score.py --all --ci-comment --md-file program.md >> /tmp/score_report.md
          echo "sections_path=$GITHUB_WORKSPACE/pr_scores.json" >> $GITHUB_OUTPUT

      - name: Check for regressions
        id: regression
        env:
          MAIN_SECTIONS_FILE: ${{ steps.main_score.outputs.sections_path }}
          PR_SECTIONS_FILE: ${{ steps.pr_score.outputs.sections_path }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          with open(os.environ["MAIN_SECTIONS_FILE"], "r", encoding="utf-8") as f:
              main_data = json.load(f)
          with open(os.environ["PR_SECTIONS_FILE"], "r", encoding="utf-8") as f:
              pr_data = json.load(f)

          main_sections = {str(s["section"]): s["score"] for s in main_data["sections"]}
          pr_sections = {str(s["section"]): s["score"] for s in pr_data["sections"]}
          
          main_total = main_data.get("total_average", 0)
          pr_total = pr_data.get("total_average", 0)

          regression = False
          for sec_id in sorted(main_sections.keys(), key=int):
              main_val = int(main_sections.get(sec_id, 0))
              pr_val = int(pr_sections.get(sec_id, 0))
              if pr_val < main_val:
                  print(f"⚠️  Section {sec_id} regressed: {main_val} → {pr_val}")
                  regression = True

          Path("regression.flag").write_text("true" if regression else "false")
          Path("totals.env").write_text(f"MAIN_TOTAL={main_total}\nPR_TOTAL={pr_total}")
          PY
          REGRESSION=$(cat regression.flag)
          echo "detected=$REGRESSION" >> $GITHUB_OUTPUT
          cat totals.env >> $GITHUB_ENV

      - name: Post score comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/score_report.md

      - name: Gate decision
        run: |
          REGRESSION="${{ steps.regression.outputs.detected }}"
          IMMUTABLE="${{ steps.immutable_check.outputs.detected }}"
          
          if [ "$IMMUTABLE" = "true" ]; then
            echo "❌ REJECTED: Immutable files modified."
            exit 1
          elif [ "$REGRESSION" = "true" ]; then
            echo "❌ REJECTED: Score regression detected."
            echo "PR score: $PR_TOTAL"
            echo "Main score: $MAIN_TOTAL"
            exit 1
          else
            echo "✅ PASSED: No regressions. Eligible for merge."
            echo "PR score: $PR_TOTAL"
            echo "Main score: $MAIN_TOTAL"
          fi


  auto-merge:
    needs: score
    runs-on: ubuntu-latest
    if: success() && !github.event.pull_request.draft
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
